# Aerospace config — modeled after Hyprland keybinds
# https://nikitabobko.github.io/AeroSpace/guide

# Start on login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

# Gaps (similar to Hyprland gaps)
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

# ====== Window rules ======
[[on-window-detected]]
if.app-id = 'org.mozilla.librewolf'
run = ['layout tiling']

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = ['layout tiling']

# ====== Apps ======
# alt = Option key (used as Super equivalent on macOS)

[mode.main.binding]
# Terminal
alt-enter = 'exec-and-forget /opt/homebrew/bin/kitty --single-instance=no'
alt-t = 'exec-and-forget /opt/homebrew/bin/kitty --single-instance=no'

# Browser
alt-e = 'exec-and-forget open -na LibreWolf'

# btop
alt-b = 'exec-and-forget /opt/homebrew/bin/kitty --single-instance=no btop'

# Close window
alt-q = 'close'

# Fullscreen
alt-f = 'fullscreen'

# Float / tiling toggle
alt-shift-f = 'layout floating tiling'

# Toggle split direction
alt-j = 'layout tiles horizontal vertical'

# ====== Focus ======
alt-left = 'focus left'
alt-right = 'focus right'
alt-up = 'focus up'
alt-down = 'focus down'

# ====== Move Windows ======
alt-shift-left = 'move left'
alt-shift-right = 'move right'
alt-shift-up = 'move up'
alt-shift-down = 'move down'

# ====== Resize Windows ======
alt-ctrl-left = 'resize width -50'
alt-ctrl-right = 'resize width +50'
alt-ctrl-up = 'resize height -50'
alt-ctrl-down = 'resize height +50'

# ====== Workspaces ======
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Monitor focus (like Super+Tab)
alt-tab = 'focus-monitor next'

# Move workspace to monitor
alt-shift-tab = 'move-workspace-to-monitor next'

# Balance window sizes
alt-shift-b = 'balance-sizes'

# Reload config
alt-shift-r = 'reload-config'
