# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# https://wiki.hyprland.org/Configuring/Window-Rules/

# ====== Transparency ======
windowrule = match:class ^(kitty)$, opacity 0.94 0.88
windowrule = match:class ^(code|code-url-handler|Code|code-oss|VSCodium)$, opacity 0.94 0.88
windowrule = match:class ^(discord)$, opacity 0.94 0.88
windowrule = match:class ^(steam|Steam)$, opacity 0.94 0.88

# ====== Floats ======
windowrule = match:class ^(org\.pulseaudio\.pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on, size 600 400, center on
windowrule = match:title ^(Save File|Open File)$, float on
windowrule = match:class ^(xdg-desktop-portal-(gtk|kde|hyprland).*)$, float on
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$, float on

# ====== Picture-in-Picture ======
windowrule = match:title ^(Picture-in-Picture)$, float on, size 960 540, center on
windowrule = match:title ^(Picture-in-Picture)$, opacity 1 override 1.0 override
windowrule = match:title ^(Picture-in-Picture)$, no_blur on
windowrule = match:title ^(Picture-in-Picture)$, no_shadow on

# ====== Gaming (keep fullscreen when unfocused) ======
windowrule = match:class ^(steam_app_.*)$, suppress_event activateother
windowrule = match:class ^(gamescope)$, suppress_event activateother

# ====== Gaming (immediate tearing for lowest latency) ======
windowrule = match:class ^(cs2)$, immediate on
windowrule = match:class ^(steam_app_730)$, immediate on

# ====== Workspace Rules ======
workspace = w[tv1-10], gapsout:5, gapsin:3
workspace = f[1], gapsout:5, gapsin:3

# ====== Layer Rules ======

