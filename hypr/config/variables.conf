source = ~/.config/hypr/config/colors.conf

# https://wiki.hyprland.org/Configuring/Variables/\#general
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 3
    # Use three wallust gradient stops for a clearer theme-matched border.
    col.active_border = $wallust_active_border $wallust_active_border_2 $wallust_active_border_3 45deg
    col.inactive_border = $wallust_inactive_border
    resize_on_border = false
    allow_tearing = false
    layout = dwindle

    # Logan: gaps_in=3, gaps_out=5, border_size=3
    # Logan: col.active_border = $cachygray, col.inactive_border = $cachymblue
    # Logan: snap { enabled = true }
}

# https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    pseudotile = true
    preserve_split = true
    # Logan: special_scale_factor = 0.8
}

# https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    new_status = master
    # Logan: special_scale_factor = 0.8
}

# https://wiki.hyprland.org/Configuring/Variables/\#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
    vrr = 0
    # Logan extras:
    # font_family = "Fira Sans"
    # enable_swallow = true
    # swallow_regex = ^(nautilus|nemo|thunar|btrfs-assistant.)$
    # focus_on_activate = true
    # vrr = 2
    # background_color = $cachydblue
    # col.splash = $cachylgreen
}

