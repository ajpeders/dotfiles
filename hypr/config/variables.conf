# ┃                    Variables Configuration                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# https://wiki.hyprland.org/Configuring/Variables/\#general
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 3
    resize_on_border = false
    allow_tearing = true
    layout = dwindle


}

# https://wiki.hyprland.org/Configuring/Dwindle-Layout/
# Note: pseudotile is dispatcher-only since Hyprland 0.55 (use the `pseudo` keybind).
dwindle {
    preserve_split = true
}

# https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/\#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vrr = 0
}

# vfr moved from misc to debug in Hyprland 0.55
debug {
    vfr = true
}

# Disable HW cursors — multi-GPU (RX 9700 + Granite Ridge iGPU) crashes
# in CDRMRenderer::blit when rendering cursor on the secondary GPU.
cursor {
    no_hardware_cursors = true
}
