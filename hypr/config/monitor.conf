# ┃                     Monitor Configuration                   ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Monitor wiki https://wiki.hyprland.org/Configuring/Monitors/
# Explicit layout (left -> right): DP-4, DP-6, HDMI-A-2
monitor = DP-4, 2560x1440@143.97, 0x0, 1
monitor = DP-6, 2560x1440@144.00, 2560x0, 1
monitor = HDMI-A-2, 1920x1080@60.00, 5120x0, 1.5

# Fallback for unknown/new displays
# monitor = , preferred, auto, auto

# Electron based apps use X11 as default, auto should detect wayland.
env = ELECTRON_OZONE_PLATFORM_HINT, auto
