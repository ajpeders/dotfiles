# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                         Keybinds                            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛




# ====== Apps ======
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, E, exec, $browser
bind = $mainMod, B, exec, $terminal btop
bind = $mainMod, Space, exec, quickshell
bind = $mainMod, V, exec, ~/.config/quickshell/scripts/clipboard-popup.sh
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, M, fullscreen, 0
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, togglefloating,

# ====== Screenshots ======
bind = $mainMod, P, exec, grim ~/Pictures/Screenshots/$(date +'%Y-%m-%d-%H%M%S_screenshot.png')
bind = $mainMod SHIFT, P, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d-%H%M%S_screenshot.png')
bind = $mainMod CTRL, P, exec, grim -g "$(slurp)" - | wl-copy


# ====== Misc ======
bindl = $mainMod, F1, workspace, previous

# ====== Monitor Focus (for gaming) ======
bind = $mainMod, Tab, focusmonitor, +1

# ====== Focus ======
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ====== Move Windows ======
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ====== Resize Windows ======
bind = $mainMod CTRL, left, resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive, 50 0
bind = $mainMod CTRL, up, resizeactive, 0 -50
bind = $mainMod CTRL, down, resizeactive, 0 50

# ====== Workspaces ======
bind = $mainMod, 1, focusworkspaceoncurrentmonitor, 1
bind = $mainMod, 2, focusworkspaceoncurrentmonitor, 2
bind = $mainMod, 3, focusworkspaceoncurrentmonitor, 3
bind = $mainMod, 4, focusworkspaceoncurrentmonitor, 4
bind = $mainMod, 5, focusworkspaceoncurrentmonitor, 5
bind = $mainMod, D, focusworkspaceoncurrentmonitor, 6
bind = $mainMod, S, focusworkspaceoncurrentmonitor, 7
bind = $mainMod, W, focusworkspaceoncurrentmonitor, 8
bind = $mainMod, G, focusworkspaceoncurrentmonitor, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, D, movetoworkspace, 6
bind = $mainMod SHIFT, S, movetoworkspace, 7
bind = $mainMod SHIFT, W, movetoworkspace, 8
bind = $mainMod SHIFT, G, movetoworkspace, 9

bind = $mainMod, C, focusworkspaceoncurrentmonitor, name:config
bind = $mainMod SHIFT, C, movetoworkspace, name:config

bind = $mainMod, K, togglespecialworkspace, magic
bind = $mainMod SHIFT, K, movetoworkspace, special:magic
bind = $mainMod, equal, togglespecialworkspace, magic
bind = $mainMod, minus, movetoworkspace, special:magic
bind = $mainMod SHIFT, equal, movetoworkspace, e+1

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ====== Media Keys ======
bindel = ,XF86AudioRaiseVolume, exec, echo "volume up" | socat - UNIX-CONNECT:/tmp/quickshell-$USER.sock
bindel = ,XF86AudioLowerVolume, exec, echo "volume down" | socat - UNIX-CONNECT:/tmp/quickshell-$USER.sock
bindel = ,XF86AudioMute, exec, echo "volume mute" | socat - UNIX-CONNECT:/tmp/quickshell-$USER.sock
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, echo "brightness up" | socat - UNIX-CONNECT:/tmp/quickshell-$USER.sock
bindel = ,XF86MonBrightnessDown, exec, echo "brightness down" | socat - UNIX-CONNECT:/tmp/quickshell-$USER.sock
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
